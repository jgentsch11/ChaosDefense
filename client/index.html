<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horde Havoc</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: 'Segoe UI', system-ui, sans-serif; }
    canvas { display: block; }

    /* Username modal */
    #login-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 100;
    }
    #login-box {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 2px solid #0f3460;
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 0 60px rgba(15,52,96,0.5);
    }
    #login-box h1 {
      color: #e94560;
      font-size: 2.4rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    #login-box p {
      color: #aaa;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
    #username-input {
      width: 260px;
      padding: 12px 16px;
      font-size: 1rem;
      border: 2px solid #0f3460;
      border-radius: 8px;
      background: #0a0a1a;
      color: #fff;
      outline: none;
      text-align: center;
    }
    #username-input::placeholder { color: #555; }
    #username-input:focus { border-color: #e94560; }
    #play-btn {
      display: block;
      width: 260px;
      margin: 16px auto 0;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #e94560, #c73659);
      color: #fff;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #play-btn:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(233,69,96,0.5); }
    #play-btn:active { transform: scale(0.97); }

    /* Leaderboard */
    #leaderboard {
      position: fixed;
      top: 16px; right: 16px;
      width: 240px;
      background: rgba(10,10,26,0.88);
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 16px;
      z-index: 50;
      display: none;
    }
    #leaderboard h2 {
      color: #e94560;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-align: center;
    }
    #leaderboard ol {
      list-style: none;
      counter-reset: lb;
    }
    #leaderboard li {
      counter-increment: lb;
      display: flex;
      justify-content: space-between;
      padding: 5px 8px;
      color: #ccc;
      font-size: 0.82rem;
      border-radius: 4px;
    }
    #leaderboard li::before {
      content: counter(lb) ".";
      margin-right: 8px;
      color: #666;
      min-width: 20px;
    }
    #leaderboard li.me {
      background: rgba(233,69,96,0.2);
      color: #e94560;
      font-weight: 700;
    }
    .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { margin-left: 8px; font-variant-numeric: tabular-nums; }

    /* Score HUD */
    #score-hud {
      position: fixed;
      top: 16px; left: 16px;
      color: #fff;
      font-size: 1.4rem;
      font-weight: 700;
      z-index: 50;
      display: none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      pointer-events: none;
    }

    #lives-hud {
      position: fixed;
      top: 48px; left: 16px;
      color: #e94560;
      font-size: 1.2rem;
      font-weight: 700;
      z-index: 50;
      display: none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      pointer-events: none;
    }

    #lives-hud.damage {
      animation: damageFlash 0.3s ease;
    }

    #level-hud {
      position: fixed;
      top: 76px; left: 16px;
      color: #ffe184;
      font-size: 0.95rem;
      font-weight: 700;
      z-index: 50;
      display: none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      pointer-events: none;
    }
    #level-hud small {
      display: block;
      color: #d2d7e5;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.4px;
      margin-top: 2px;
    }

    #boss-warning {
      position: fixed;
      top: 28%;
      left: 50%;
      transform: translateX(-50%);
      color: #ff2200;
      font-size: 3rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 6px;
      z-index: 80;
      display: none;
      text-shadow: 0 0 20px rgba(255,34,0,0.8), 0 0 40px rgba(255,34,0,0.4);
      animation: bossWarningPulse 0.8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes bossWarningPulse {
      0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
      50% { opacity: 0.7; transform: translateX(-50%) scale(1.08); }
    }

    #level-complete-overlay {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.7);
      z-index: 90;
      pointer-events: none;
    }
    #level-complete-box {
      text-align: center;
      animation: levelCompletePopIn 0.4s ease-out;
    }
    #level-complete-title {
      color: #ffd700;
      font-size: 3.5rem;
      text-transform: uppercase;
      letter-spacing: 6px;
      text-shadow: 0 0 30px rgba(255,215,0,0.6), 0 0 60px rgba(255,215,0,0.3);
      margin-bottom: 12px;
    }
    #level-complete-subtitle {
      color: #ccc;
      font-size: 1.2rem;
      letter-spacing: 1px;
    }
    @keyframes levelCompletePopIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    #powerups-hud {
      position: fixed;
      top: 116px; left: 16px;
      width: 230px;
      background: rgba(10, 10, 26, 0.9);
      border: 1px solid #2463b7;
      border-radius: 10px;
      padding: 10px 12px;
      z-index: 50;
      display: none;
      pointer-events: none;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }
    #powerups-hud h3 {
      color: #7ec8ff;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }
    #powerups-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .powerup-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 6px;
      border-radius: 6px;
      background: rgba(30, 62, 100, 0.35);
      color: #d8ecff;
      font-size: 0.82rem;
    }
    .powerup-label {
      font-weight: 700;
    }
    .powerup-timer {
      font-variant-numeric: tabular-nums;
      color: #9bd4ff;
      margin-left: 8px;
    }
    .powerup-empty {
      color: #8598b3;
      font-size: 0.78rem;
      padding: 3px 2px;
    }

    #controls-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 0.9rem;
      letter-spacing: 1px;
      z-index: 50;
      display: none;
      pointer-events: none;
    }

    @keyframes damageFlash {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); color: #ff0000; }
      100% { transform: scale(1); }
    }

    /* Game Over */
    #gameover-overlay {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.88);
      z-index: 100;
    }
    #gameover-box {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 2px solid #e94560;
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 0 60px rgba(233,69,96,0.4);
    }
    #gameover-box h1 {
      color: #e94560;
      font-size: 2.2rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    #gameover-score {
      color: #fff;
      font-size: 1.4rem;
      margin-bottom: 24px;
    }
    #retry-btn {
      display: block;
      width: 220px;
      margin: 0 auto;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #e94560, #c73659);
      color: #fff;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #retry-btn:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(233,69,96,0.5); }
    #retry-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <!-- Login overlay -->
  <div id="login-overlay">
    <div id="login-box">
      <h1>Horde Havoc</h1>
      <p>Enter a name or play as a guest</p>
      <input id="username-input" type="text" placeholder="Guest_1234" maxlength="20" autofocus />
      <button id="play-btn">Play</button>
    </div>
  </div>

  <!-- In-game HUD -->
  <div id="score-hud">Score: <span id="score-value">0</span></div>
  <div id="lives-hud"><span id="lives-value">20</span></div>
  <div id="level-hud">
    Level <span id="level-value">1</span>
    <small><span id="level-timer-value">3:00</span></small>
  </div>
  <div id="powerups-hud">
    <h3>Active Power-Ups</h3>
    <ul id="powerups-list">
      <li class="powerup-empty">No active power-ups</li>
    </ul>
  </div>
  <div id="controls-hint">&larr; &rarr; Move &nbsp;&nbsp; &uarr; / W Piercing Shot</div>

  <!-- Boss Warning -->
  <div id="boss-warning">BOSS INCOMING</div>

  <!-- Level Complete -->
  <div id="level-complete-overlay">
    <div id="level-complete-box">
      <h1 id="level-complete-title">LEVEL 1 COMPLETE!</h1>
      <p id="level-complete-subtitle">Choose your power-up!</p>
    </div>
  </div>

  <!-- Game Over -->
  <div id="gameover-overlay">
    <div id="gameover-box">
      <h1>Game Over</h1>
      <p id="gameover-score">Final Score: 0</p>
      <button id="retry-btn">Play Again</button>
    </div>
  </div>

  <div id="leaderboard">
    <h2>Active Players (Best)</h2>
    <ol id="lb-list"></ol>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
